{
  "services": [
    {
      "type": "web",
      "name": "hungry-bird-api",
      "runtime": "python",
      "rootDir": "backend",
      "buildCommand": "pip install -r requirements.txt && flask db upgrade",
      "startCommand": "gunicorn run:app",
      "envVars": [
        {
          "key": "SECRET_KEY",
          "generateValue": true
        },
        {
          "key": "DATABASE_URL",
          "fromDatabase": {
            "name": "hungry-bird-db",
            "property": "connectionString"
          }
        },
        {
          "key": "GOOGLE_MAPS_API_KEY",
          "sync": false
        },
        {
          "key": "PYTHON_VERSION",
          "value": "3.11.0"
        },
        {
          "key": "FLASK_APP",
          "value": "run.py"
        }
      ]
    }
  ],
  "databases": [
    {
      "name": "hungry-bird-db",
      "databaseName": "hungrybird",
      "user": "hungrybird",
      "plan": "free"
    }
  ]
}
